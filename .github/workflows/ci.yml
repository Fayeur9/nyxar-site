name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─────────────────────────────────────────────────────────
  # 1. Qualité du code : ESLint sur le frontend React
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint .

  # ─────────────────────────────────────────────────────────
  # 2. Tests d'intégration : Jest + Supertest + MySQL service
  #    + publication du rapport coverage en artifact
  # ─────────────────────────────────────────────────────────
  test:
    name: Tests d'intégration (Jest + MySQL)
    runs-on: ubuntu-latest
    needs: lint

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: nyxar_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Wait for MySQL to be ready
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "MySQL is up"
              exit 0
            fi
            sleep 1
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Generate .env for backend (CI values)
        working-directory: backend
        run: |
          cat > .env <<'EOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_NAME=nyxar_test
          DB_USER=root
          DB_PASSWORD=root
          JWT_SECRET=ci-secret-github-actions
          NODE_ENV=test
          PORT=5177
          EOF
          cp .env .env.test

      - name: Initialize test database schema
        working-directory: backend
        run: node db-cli.js init

      - name: Seed init data (roles, admin)
        working-directory: backend
        run: node db-cli.js setup

      - name: Run Jest integration tests with coverage
        working-directory: backend
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: backend/coverage/
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # 3. Audit de sécurité : npm audit sur les 3 packages
  #    (OWASP A06 — composants vulnérables)
  # ─────────────────────────────────────────────────────────
  security:
    name: Audit sécurité (npm audit)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Security audit — root
        run: npm audit --audit-level=high

      - name: Security audit — backend
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Security audit — frontend
        working-directory: frontend
        run: npm audit --audit-level=high

  # ─────────────────────────────────────────────────────────
  # 4. Analyse statique SAST : CodeQL sur le code JavaScript
  #    (OWASP A03 — injection, patterns vulnérables)
  # ─────────────────────────────────────────────────────────
  codeql:
    name: Analyse SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: security
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ─────────────────────────────────────────────────────────
  # 5. Build : vérifier que `npm run build` produit bien les
  #    assets dans backend/public (reproduit le build Railway).
  #    Dernière étape — ne tourne que si tout le reste est vert.
  # ─────────────────────────────────────────────────────────
  build:
    name: Build (Vite → backend/public)
    runs-on: ubuntu-latest
    needs: codeql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Build (install deps + vite build + copy to backend/public)
        run: npm run build
